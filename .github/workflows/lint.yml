name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@04a6d8cfe9d251e2afb78c5bdc6274ec9642aea2 # master
        with:
          core: false
          cask: false
          test-bot: false

      - uses: Homebrew/actions/cache-homebrew-prefix@04a6d8cfe9d251e2afb78c5bdc6274ec9642aea2 # main
        with:
          install: zsh
          uninstall: true

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Syntax check Brewfiles (ruby -c)
        run: |
          ruby -c .Brewfile-base
          ruby -c .Brewfile-kiosk
          ruby -c .Brewfile-production

      - name: Syntax check .zshrc (zsh -n)
        run: zsh -n .zshrc

      - name: Syntax check config.sh (bash -n)
        run: bash -n config.sh

      - name: Syntax check .hyper.js (node -c)
        run: node -c .hyper.js

